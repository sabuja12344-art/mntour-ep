name: EP 자동 갱신

on:
  schedule:
    # 네이버 쇼핑 수집 30분 전 갱신 (GitHub 서버 시간 = UTC, 한국은 +9시간)
    # 한국시간  새벽 1시  → UTC 15:30 (전날)
    # 한국시간  오전 10시 → UTC 00:30
    # 한국시간  오후  2시 → UTC 04:30
    # 한국시간  오후  6시 → UTC 08:30
    - cron: '30 15,0,4,8 * * *'
  workflow_dispatch:       # GitHub 사이트에서 수동 실행 버튼도 생김

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: EP 생성 실행
        run: python crawler.py

      - name: ep.txt 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ep.txt
          git diff --staged --quiet || git commit -m "EP 자동 갱신: $(date '+%Y-%m-%d %H:%M KST')"
          git push
